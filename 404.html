<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all GitHub Pages 404s back to index.html, preserving the path
      const path = window.location.pathname + window.location.search;
      const hash = window.location.hash;
      window.location.replace('/?p=' + encodeURIComponent(path) + (hash ? '&h=' + encodeURIComponent(hash) : ''));
    </script>
  </head>
  <body></body>
</html>
