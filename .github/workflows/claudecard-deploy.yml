name: Deploy ClaudeCard.pro

on:
  push:
    branches: [main]
    paths:
      - 'Desktop/claudecard/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Desktop/claudecard/package-lock.json

      - name: Install
        working-directory: Desktop/claudecard
        run: npm ci

      - name: Build
        working-directory: Desktop/claudecard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Desktop/claudecard/dist
          cname: claudecard.pro
